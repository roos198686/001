name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build app
        run: npm run build

      # 仅同步，不触发内置pod install
      - name: Capacitor sync
        run: npx cap sync ios --no-pod

      # 现在文件已生成，修改版本再安装依赖
      - name: Fix version & pod install
        run: |
          sed -i '' 's/platform :ios, ".*"/platform :ios, "16.0"/' ios/App/Podfile
          cd ios/App && pod install

      - name: Archive app
        run: xcodebuild archive -workspace ios/App/App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: mkdir -p output && xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist ios/ExportOptions_NoSign.plist -exportPath output

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output