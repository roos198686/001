name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npm run build

      - name: Capacitor sync ios
        run: npx cap sync ios

      - name: Fix deployment target
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/' ios/App/App.xcodeproj/project.pbxproj

      - name: Build app
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build_cache \
            CONFIGURATION_BUILD_DIR=$PWD/build_out \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p ./ipa/Payload
          cp -r ./build_out/*.app ./ipa/Payload/
          cd ./ipa
          zip -r App.ipa Payload/
          ls -la ./ipa/

      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ./ipa/App.ipa
          if-no-files-found: error