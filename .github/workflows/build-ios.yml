name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npm run build

      - name: Capacitor sync ios
        run: npx cap sync ios

      - name: Fix deployment target
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/' ios/App/App.xcodeproj/project.pbxproj

      - name: Archive app
        run: xcodebuild archive -project ios/App/App.xcodeproj -scheme App -configuration Release -sdk iphoneos -archivePath ./output/App.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=""

      - name: Export IPA
        run: xcodebuild -exportArchive -archivePath ./output/App.xcarchive -exportOptionsPlist ios/ExportOptions_NoSign.plist -exportPath ./output -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output