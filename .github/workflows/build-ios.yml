name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      # 关键：在CI里完整同步一次，Capacitor会自动生成Podfile
      - name: Capacitor sync
        run: npx cap sync ios

      # 再执行pod install（此时Podfile已经生成）
      - name: Pod install
        run: cd ios/App && pod install

      - name: Archive
        run: xcodebuild archive -workspace ios/App/App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Export
        run: mkdir output && xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist ios/ExportOptions_NoSign.plist -exportPath output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output