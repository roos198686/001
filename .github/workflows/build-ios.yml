name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build app
        run: npm run build

      # 先清理旧iOS目录，避免残留文件干扰
      - name: Clean old ios project
        run: rm -rf ios

      # 纯官方命令，无任何非法参数
      - name: Capacitor add & sync
        run: |
          npx cap add ios
          npx cap sync ios

      # 官方标准Podfile，Capacitor全版本通用
      - name: Generate standard Podfile
        run: |
          cat > ios/App/Podfile << 'EOF'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'
          platform :ios, '15.0'
          use_frameworks!
          use_modular_headers!
          target 'App' do
            capacitor_pods
          end
          post_install do |installer|
            assertDeploymentTarget(installer)
          end
          EOF

      - name: Install pods
        run: cd ios/App && pod install --repo-update

      - name: Archive
        run: xcodebuild archive \
          -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p output
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist ios/ExportOptions_NoSign.plist \
            -exportPath output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output