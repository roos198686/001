name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build app
        run: npm run build

      # 先修改Xcode项目最低版本，再执行同步，从根源规避pod报错
      - name: Fix iOS target before sync
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/platform :ios, .*/platform :ios, "16.0"/' ios/App/Podfile

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Pod install
        run: cd ios/App && pod install

      - name: Archive app
        run: xcodebuild archive -workspace ios/App/App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: mkdir -p output && xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist ios/ExportOptions_NoSign.plist -exportPath output

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output