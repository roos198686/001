name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Build iOS
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          cd ios/App
          pod install

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build.xcarchive \
            -exportOptionsPlist ios/ExportOptions_NoSign.plist \
            -exportPath output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output