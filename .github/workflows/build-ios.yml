name: Build iOS (No Sign)
on:
  push:
    branches: [ master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Recreate Capacitor iOS project
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Install CocoaPods & Pods
        run: |
          sudo gem install cocoapods --no-document
          cd ios/App
          sed -i '' 's/platform :ios, .*/platform :ios, '\''15.0'\''/' Podfile
          cat Podfile
          pod install --repo-update

      - name: Xcode Archive (No Sign)
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_REQUIRED=NO

      - name: Export unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/App.xcarchive \
            -exportOptionsPlist $GITHUB_WORKSPACE/ios/ExportOptions_NoSign.plist \
            -exportPath $GITHUB_WORKSPACE/output \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: output/*.ipa