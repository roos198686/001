name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npm run build

      # 标准同步命令，无任何额外参数
      - name: Capacitor sync ios
        run: npx cap sync ios

      # 修改项目最低部署版本，解决依赖版本冲突
      - name: Fix deployment target
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/' ios/App/App.xcodeproj/project.pbxproj

      # 使用 .xcodeproj 编译（无 workspace、无 pod）
      - name: Archive app
        run: xcodebuild archive \
          -project ios/App/App.xcodeproj \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p output
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist ios/ExportOptions_NoSign.plist \
            -exportPath output

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output