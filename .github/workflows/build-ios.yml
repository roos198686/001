name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build app
        run: npm run build

      # 1. 先同步一次，确保iOS目录结构存在
      - name: Capacitor sync
        run: npx cap sync ios

      # 2. 手动创建标准的Podfile，这是关键！
      - name: Create Podfile manually
        run: |
          cat > ios/App/Podfile << 'EOF'
          platform :ios, '15.0'
          use_frameworks!
          use_modular_headers!

          install! 'cocoapods', :disable_input_output_paths => true

          target 'App' do
            use_frameworks!
            use_modular_headers!

            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios/CapacitorCordova'
          end
          EOF

      # 3. 现在Podfile已经存在，执行pod install
      - name: Pod install
        run: cd ios/App && pod install --repo-update

      - name: Archive app
        run: xcodebuild archive -workspace ios/App/App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: mkdir -p output && xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist ios/ExportOptions_NoSign.plist -exportPath output

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output