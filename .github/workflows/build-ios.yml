name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build app
        run: npm run build

      # 1. 用Capacitor官方方式初始化iOS工程（关键：加--ios）
      - name: Capacitor init and add iOS
        run: |
          npx cap init --web-dir dist --ios
          npx cap add ios
          npx cap sync ios

      # 2. 手动写入适配新版本的Podfile
      - name: Create Podfile manually
        run: |
          cat > ios/App/Podfile << 'EOF'
          platform :ios, '15.0'
          use_frameworks!
          use_modular_headers!

          install! 'cocoapods', :disable_input_output_paths => true

          target 'App' do
            use_frameworks!
            use_modular_headers!

            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            # 新版本Capacitor不需要单独引用CapacitorCordova了
          end
          EOF

      # 3. 安装依赖
      - name: Pod install
        run: cd ios/App && pod install --repo-update

      - name: Archive app
        run: xcodebuild archive -workspace ios/App/App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: mkdir -p output && xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist ios/ExportOptions_NoSign.plist -exportPath output

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output