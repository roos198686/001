name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build app
        run: npm run build

      # 1. 标准初始化：无任何非法参数
      - name: Capacitor init & add iOS
        run: |
          npx cap init MyApp com.example.myapp --web-dir dist -y
          npx cap add ios
          npx cap sync ios

      # 2. 官方标准 Podfile（Capacitor 4+ 正确写法）
      - name: Write official Podfile
        run: |
          cat > ios/App/Podfile << 'EOF'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'

          platform :ios, '14.0'
          use_frameworks!
          use_modular_headers!

          target 'App' do
            capacitor_pods
          end

          post_install do |installer|
            assertDeploymentTarget(installer)
          end
          EOF

      # 3. 正常 pod install
      - name: Pod install
        run: cd ios/App && pod install --repo-update

      - name: Archive app
        run: xcodebuild archive \
          -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p output
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist ios/ExportOptions_NoSign.plist \
            -exportPath output

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output