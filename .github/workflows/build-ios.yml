name: Build iOS
on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npm run build

      - name: Capacitor sync ios
        run: npx cap sync ios

      - name: Fix deployment target
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/' ios/App/App.xcodeproj/project.pbxproj

      # 编译出 .app 包，不做archive归档
      - name: Build app
        run: xcodebuild build -project ios/App/App.xcodeproj -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=""

      # 找到编译产物，手动打包为IPA（绕开Team校验）
      - name: Package IPA
        run: |
          mkdir -p output/Payload
          find ./ios/App/build/Release-iphoneos -name "*.app" -type d -exec cp -r {} ./output/Payload/ \;
          cd output
          zip -q -r App.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output